<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>公众号智能体面板</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --line: #d9e2ec;
      --text: #17202a;
      --muted: #607086;
      --brand: #0f8b8d;
      --brand2: #146c94;
      --warn: #b45309;
      --danger: #b91c1c;
      --ok: #047857;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
    }
    header {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .brand { font-weight: 800; font-size: 17px; }
    .status { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #94a3b8; }
    .dot.ok { background: var(--ok); }
    main {
      display: grid;
      grid-template-columns: 360px minmax(420px, 1fr) 420px;
      gap: 14px;
      padding: 14px;
      height: calc(100vh - 56px);
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      min-height: 0;
    }
    .section-head {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
    }
    .body { padding: 14px; overflow: auto; height: calc(100% - 44px); }
    label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin: 12px 0 6px; }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px 10px;
      font: inherit;
      color: var(--text);
      background: #fff;
      outline: none;
    }
    textarea { min-height: 98px; resize: vertical; line-height: 1.65; }
    input:focus, textarea:focus, select:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(15,139,141,.12); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 7px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }
    button.primary { background: var(--brand); border-color: var(--brand); color: #fff; }
    button.publish { background: var(--brand2); border-color: var(--brand2); color: #fff; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .hint { color: var(--muted); font-size: 12px; line-height: 1.6; margin-top: 8px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; align-items: center; }
    .toolbar select, .toolbar input { width: auto; min-width: 92px; padding: 7px 8px; }
    .editor-title { font-size: 24px; font-weight: 800; padding: 10px 0; border: 0; border-bottom: 1px solid var(--line); border-radius: 0; }
    .editor-summary { min-height: 66px; }
    #markdown { min-height: 430px; font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; }
    .preview {
      max-width: 650px;
      margin: 0 auto;
      padding: 8px 8px 40px;
      color: #263238;
    }
    .preview h2 { margin: 26px 0 12px; padding-left: 10px; border-left: 4px solid #0ea5e9; color: #0f172a; font-size: 19px; }
    .preview h3 { margin: 22px 0 10px; color: #155e75; font-size: 17px; }
    .preview p { margin: 12px 0; line-height: 1.9; font-size: 15px; }
    .preview blockquote { margin: 16px 0; padding: 12px 14px; background: #f0f9ff; border-left: 4px solid #38bdf8; color: #334155; }
    .cover-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #eef6f7;
    }
    canvas { display: block; width: 100%; aspect-ratio: 2.35 / 1; background: #eef6f7; }
    .log {
      margin-top: 12px;
      padding: 10px;
      min-height: 88px;
      max-height: 160px;
      overflow: auto;
      background: #0f172a;
      color: #dbeafe;
      border-radius: 7px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 12px;
      line-height: 1.7;
      white-space: pre-wrap;
    }
    .video-result {
      display: none;
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #f8fafc;
    }
    .video-result video {
      width: 100%;
      max-height: 260px;
      display: block;
      border-radius: 7px;
      background: #000;
    }
    .video-result .actions { margin-top: 8px; }
    .article-video {
      margin: 14px 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
    }
    .article-video video {
      width: 100%;
      max-height: 360px;
      display: block;
      border-radius: 7px;
      background: #000;
    }
    .article-video a {
      display: inline-block;
      margin-top: 8px;
      color: var(--brand2);
      font-weight: 800;
      text-decoration: none;
    }
    .pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 8px; border-radius: 999px; background: #e0f2fe; color: #075985; font-size: 12px; }
    .generated-image {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-top: 12px;
      display: none;
    }
    .image-library {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
      max-height: 250px;
      overflow: auto;
    }
    .image-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      cursor: grab;
    }
    .image-card.selected { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(15,139,141,.12); }
    .image-card img { width: 100%; display: block; aspect-ratio: 4 / 3; object-fit: cover; }
    .image-card .caption { padding: 7px 8px; font-size: 11px; color: var(--muted); line-height: 1.35; height: 42px; overflow: hidden; }
    .image-card-actions {
      display: flex;
      gap: 6px;
      padding: 0 7px 7px;
    }
    .image-card-actions button {
      flex: 1;
      padding: 5px 6px;
      font-size: 12px;
    }
    .drop-ready { border-color: var(--brand) !important; box-shadow: 0 0 0 3px rgba(15,139,141,.12); }
    .placeholder-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }
    .placeholder-item {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 7px;
      background: #f8fafc;
      min-height: 78px;
    }
    .placeholder-item div {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      margin-bottom: 6px;
      height: 34px;
      overflow: hidden;
    }
    .placeholder-item button { padding: 6px 8px; font-size: 12px; }
    .asset-panel {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 8px 8px 0 0;
      position: sticky;
      bottom: -1px;
      z-index: 4;
      background: var(--panel);
      box-shadow: 0 -10px 22px rgba(15, 23, 42, .06);
    }
    .asset-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      font-weight: 800;
    }
    .asset-head button { padding: 4px 8px; min-width: 34px; }
    .asset-content {
      padding: 10px;
      max-height: 390px;
      overflow: auto;
    }
    .asset-panel.collapsed .asset-content { display: none; }
    .asset-panel.collapsed {
      box-shadow: 0 -4px 12px rgba(15, 23, 42, .05);
    }
    .history-panel {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
      overflow: hidden;
    }
    .history-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      font-weight: 800;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      max-height: 260px;
      overflow: auto;
    }
    .history-item {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
    }
    .history-title {
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .history-time {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }
    .history-empty {
      color: var(--muted);
      padding: 14px;
    }
    .upload-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .upload-row input { flex: 1; min-width: 220px; }
    .inline-figure-flow {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .figure-slot {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #f8fafc;
    }
    .figure-slot-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      font-weight: 800;
      font-size: 13px;
    }
    .figure-slot textarea { min-height: 72px; }
    .figure-slot .actions { margin-top: 8px; }
    .figure-slot input[type="file"] { margin-top: 8px; }
    .visual-editor {
      min-height: 360px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }
    .visual-block {
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 8px;
      margin: 8px 0;
      background: #fff;
    }
    .visual-block:hover,
    .visual-block.drag-over,
    .visual-block.active {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(15,139,141,.10);
    }
    .visual-text {
      white-space: pre-wrap;
      line-height: 1.85;
      outline: none;
    }
    .visual-image img {
      width: 100%;
      max-height: 460px;
      object-fit: contain;
      display: block;
      border-radius: 8px;
      background: #f8fafc;
    }
    .visual-video video {
      width: 100%;
      max-height: 360px;
      display: block;
      border-radius: 8px;
      background: #000;
    }
    .visual-image-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .visual-empty { color: var(--muted); padding: 20px 8px; }
    .source-collapsed { display: none; }
    .paste-box { min-height: 100px; }
    .float-panel {
      position: fixed;
      right: 438px;
      top: 92px;
      width: min(420px, calc(100vw - 32px));
      max-height: calc(100vh - 120px);
      display: none;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(15, 23, 42, .18);
      z-index: 20;
      overflow: auto;
    }
    .float-panel.open { display: flex; }
    .float-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-weight: 800; }
    .float-head button { padding: 5px 9px; }
    .float-panel textarea { min-height: 92px; }
    .prompt-chips { display: flex; flex-direction: column; gap: 8px; }
    .prompt-chip {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: var(--text);
      font-weight: 500;
      line-height: 1.45;
    }
    .mini-library {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .mini-library .image-card img { aspect-ratio: 4 / 3; }
    .mini-library .image-card .caption { height: 38px; }
    @media (max-width: 1160px) {
      .float-panel { right: 16px; left: 16px; top: 74px; width: auto; }
    }
    @media (max-width: 1160px) {
      main { grid-template-columns: 1fr; height: auto; }
      section { min-height: auto; }
      .body { height: auto; }
      .placeholder-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">公众号智能体面板</div>
    <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">检测中</span></div>
  </header>

  <main>
    <section>
      <div class="section-head">要求区 <span class="pill">草稿箱优先</span></div>
      <div class="body">
        <label>选题</label>
        <textarea id="topic" placeholder="例：介绍一个公众号 AI 工作台，如何从选题、配图、排版到保存草稿箱"></textarea>

        <div class="row">
          <div>
            <label>目标读者</label>
            <input id="audience" value="公众号运营者、内容创作者、小团队负责人">
          </div>
          <div>
            <label>语气</label>
            <select id="tone">
              <option>清楚、接地气、有判断</option>
              <option>专业、克制、适合老板看</option>
              <option>像朋友聊天，少术语</option>
              <option>偏干货教程，步骤明确</option>
            </select>
          </div>
        </div>

        <label>必须写进去的要点</label>
        <textarea id="points" placeholder="一行一个要点。比如：AI生成文章、封面图、正文配图、可视排版、一键保存草稿箱"></textarea>

        <label>封面图提示词</label>
        <textarea id="coverPrompt" placeholder="例：一张干净爽朗的风景图。AI封面只看这里，不参考文章内容"></textarea>
        <div class="hint">公众号封面图只按这里生成，不读取文章标题、摘要、正文、目标读者或行业背景。</div>

        <label>正文插图提示词</label>
        <textarea id="mediaPrompt" placeholder="例：一张清爽的公众号插图，表现一个工作流从选题到草稿箱的过程"></textarea>
        <div class="hint">这里用于正文插图，不会影响公众号封面。</div>

        <label>视频提示词</label>
        <textarea id="videoPrompt" placeholder="例：一个简洁的工具演示短视频，展示从选题到保存草稿箱的过程"></textarea>

        <label>发布口令</label>
        <input id="token" type="password" placeholder="服务器 config.local.json 里的 publishToken">
        <label>发布后端地址</label>
        <input id="publishBaseUrl" placeholder="本地生成、服务器发布时填：http://106.53.141.12">
        <label>AI生成后端地址</label>
        <input id="generateBaseUrl" placeholder="服务器无法生成时填：http://127.0.0.1:3100">
        <label>AI &#24179;&#21488;</label>
        <select id="aiProvider" onchange="applyProviderPreset(true)">
          <option value="agnes">Agnes</option>
          <option value="volcengine">&#28779;&#23665;</option>
          <option value="siliconflow">&#30889;&#22522;</option>
          <option value="custom">&#33258;&#23450;&#20041;</option>
        </select>
        <label>AI Base URL</label>
        <input id="aiBaseUrl" placeholder="https://apihub.agnes-ai.com/v1">
        <label>&#33258;&#23450;&#20041; API Key</label>
        <input id="aiApiKey" type="password" placeholder="&#21035;&#20154;&#20351;&#29992;&#26102;&#22635;&#33258;&#24049;&#30340; Key&#65307;&#19981;&#22635;&#21017;&#38656;&#35201;&#21457;&#24067;&#21475;&#20196;">
        <div class="row">
          <div>
            <label>&#25991;&#26412;&#27169;&#22411;</label>
            <input id="aiTextModel" placeholder="agnes-2.0-flash">
          </div>
          <div>
            <label>&#22270;&#29255;&#27169;&#22411;</label>
            <input id="aiImageModel" placeholder="agnes-image-2.1-flash">
          </div>
        </div>
        <label>&#35270;&#39057;&#27169;&#22411;</label>
        <input id="aiVideoModel" placeholder="agnes-video-v2.0">
        <div class="hint">&#21035;&#20154;&#22635;&#33258;&#24049;&#30340; Key &#21482;&#33021;&#29983;&#25104;&#25991;&#31456;/&#22270;&#29255;/&#35270;&#39057;&#65307;&#21457;&#24067;&#21040;&#20320;&#30340;&#20844;&#20247;&#21495;&#33609;&#31295;&#31665;&#20173;&#38656;&#35201;&#21457;&#24067;&#21475;&#20196;&#12290;</div>

        <div class="actions">
          <button class="primary" id="composeBtn" onclick="compose()">AI生成文章</button>
          <button onclick="generateAiCover()">AI生成封面图</button>
          <button onclick="renderCover()">备用文字封面</button>
          <button onclick="generateAiImage()">AI生成插图</button>
          <button onclick="insertGeneratedImage()">插入正文</button>
          <button onclick="generateVideo()">生成视频</button>
          <button onclick="testToken()">测试微信连接</button>
        </div>
      </div>
    </section>

    <section>
      <div class="section-head">生成区</div>
      <div class="body">
        <input class="editor-title" id="title" placeholder="标题">
        <label>摘要</label>
        <textarea class="editor-summary" id="summary" placeholder="分享卡片摘要，建议 60-120 字"></textarea>
        <label>正文排版</label>
        <div class="toolbar">
          <button onclick="formatSelection('h2')">标题</button>
          <button onclick="formatSelection('bold')">加粗</button>
          <button onclick="formatSelection('quote')">引用</button>
          <select id="fontSize">
            <option value="15">15px</option>
            <option value="16">16px</option>
            <option value="18">18px</option>
            <option value="20">20px</option>
          </select>
          <input id="fontColor" type="color" value="#0f172a">
          <button onclick="formatSelection('style')">应用样式</button>
        </div>
        <div id="visualEditor" class="visual-editor"></div>
        <textarea id="markdown" class="source-collapsed" oninput="refreshPreview()" placeholder="这里编辑正文"></textarea>
        <textarea id="pasteInput" class="paste-box source-collapsed" placeholder="把已有文章粘贴到这里"></textarea>
        <div id="inlineFigureSlots" class="inline-figure-flow"></div>
        <div class="actions">
          <button onclick="refreshPreview()">刷新预览</button>
          <button onclick="toggleSource()">源码</button>
          <button onclick="togglePasteBox()">粘贴文章</button>
          <button onclick="importPastedArticle()">导入粘贴内容</button>
          <button onclick="insertGeneratedImage()">插入选中图片</button>
          <button onclick="useGeneratedImageAsCover()">设为封面</button>
          <button onclick="saveCurrentArticle()">保存历史</button>
          <button onclick="toggleArticleHistory()">历史文章</button>
          <button class="publish" id="publishBtn" onclick="publishDraft()">发布到公众号草稿箱</button>
        </div>

        <div id="historyPanel" class="history-panel source-collapsed">
          <div class="history-head">
            <span>历史文章</span>
            <button onclick="loadArticleHistory()">刷新</button>
          </div>
          <div id="historyList" class="history-list"></div>
        </div>

        <div class="log" id="log">等待操作...</div>
        <div id="videoResult" class="video-result">
          <label>视频结果</label>
          <video id="videoPreview" controls></video>
          <div class="actions">
            <button onclick="checkCurrentVideoStatus()">刷新视频状态</button>
            <button onclick="openCurrentVideo()">打开视频链接</button>
            <button onclick="insertCurrentVideo()">插入正文</button>
          </div>
          <div class="hint" id="videoStatusText"></div>
        </div>

        <div id="assetPanel" class="asset-panel">
          <div class="asset-head">
            <span>插图素材</span>
            <button id="assetToggle" onclick="toggleAssetPanel()">▼</button>
          </div>
          <div id="assetContent" class="asset-content">
            <label>文章插图建议</label>
            <div id="placeholderList" class="placeholder-list"></div>

            <label>图片素材库</label>
            <div class="upload-row">
              <input id="uploadImageInput" type="file" accept="image/*" multiple>
              <button onclick="handleImageUpload()">上传本地图片</button>
              <button onclick="generateAiImage()">AI生成插图</button>
            </div>
            <div class="hint">素材库里的图片可以拖进正文，也可以点选后插入正文或设为封面。</div>
            <div id="imageLibrary" class="image-library"></div>
          </div>
        </div>
      </div>
    </section>

    <section>
      <div class="section-head">发布预览</div>
      <div class="body">
        <canvas id="cover" width="900" height="383" style="display:none"></canvas>
        <label>当前封面图</label>
        <img id="coverPreview" class="generated-image" alt="当前封面图">
        <div class="hint">这里保持干净，只显示最终公众号草稿的大致效果。</div>
        <hr style="border:0;border-top:1px solid var(--line);margin:14px 0">
        <div class="preview" id="preview"></div>
      </div>
    </section>
  </main>

  <div id="imageAssistant" class="float-panel">
    <div class="float-head">
      <span>插图助手</span>
      <button onclick="closeImageAssistant()">关闭</button>
    </div>
    <div class="hint">先点正文里想放图的位置，再生成或选择图片，点“插入到光标位置”。也可以把下方缩略图拖进正文。</div>
    <label>当前图片提示词</label>
    <textarea id="assistantPrompt" placeholder="写清楚你想要的画面，例如：一张干净的夕阳日落风景照片，城市远景，无人物、无文字"></textarea>
    <div class="actions">
      <button class="primary" onclick="generateAssistantImage()">AI生成图片</button>
      <button onclick="insertGeneratedImage()">插入到光标位置</button>
      <button onclick="useGeneratedImageAsCover()">设为封面</button>
    </div>
    <div class="upload-row">
      <input id="assistantUploadImageInput" type="file" accept="image/*" multiple>
      <button onclick="handleAssistantImageUpload()">上传本地图片</button>
    </div>
    <label>文章建议插图</label>
    <div id="assistantPromptList" class="prompt-chips"></div>
    <label>已生成 / 已上传图片</label>
    <div id="assistantImageLibrary" class="mini-library"></div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const APP_BASE_PATH = (() => {
      const first = location.pathname.split('/').filter(Boolean)[0] || '';
      return ['gongzhonghao', 'mp'].includes(first) ? `/${first}` : '';
    })();
    let coverDataUrl = '';
    let currentHtml = '';
    let generatedImageDataUrl = '';
    let generatedImages = [];
    let selectedImageIndex = -1;
    let currentImagePrompts = [];
    let visualBlocks = [];
    let visualDragIndex = null;
    let selectedVisualIndex = -1;
    let currentArticleId = '';
    let currentVideoTask = null;
    let currentVideoUrl = '';
    let currentVideoApiBase = '';
    let videoPollTimer = 0;

    function log(message) {
      const time = new Date().toLocaleTimeString('zh-CN');
      $('log').textContent += `\n[${time}] ${message}`;
      $('log').scrollTop = $('log').scrollHeight;
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function inlineMarkdown(text) {
      return escapeHtml(text)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\+\+(.+?)\+\+/g, '<span style="color:#0f8b8d;font-weight:700">$1</span>')
        .replace(/\{color:([^}]+)\}([\s\S]+?)\{\/color\}/g, '<span style="color:$1">$2</span>')
        .replace(/\{size:(\d+)\}([\s\S]+?)\{\/size\}/g, '<span style="font-size:$1px">$2</span>')
        .replace(/`(.+?)`/g, '<code>$1</code>');
    }

    function markdownToHtml(markdown) {
      const lines = String(markdown || '').split(/\r?\n/);
      const blocks = [];
      let paragraph = [];
      const flush = () => {
        if (!paragraph.length) return;
        blocks.push(`<p>${paragraph.map(inlineMarkdown).join('<br>')}</p>`);
        paragraph = [];
      };
      for (const line of lines) {
        const t = line.trim();
        if (!t) { flush(); continue; }
        if (/^<!--[\s\S]*-->$/.test(t)) { flush(); continue; }
        if (t.startsWith('# ')) continue;
        if (t.startsWith('## ')) { flush(); blocks.push(`<h2>${inlineMarkdown(t.slice(3))}</h2>`); continue; }
        if (t.startsWith('### ')) { flush(); blocks.push(`<h3>${inlineMarkdown(t.slice(4))}</h3>`); continue; }
        if (t.startsWith('> ')) { flush(); blocks.push(`<blockquote>${inlineMarkdown(t.slice(2))}</blockquote>`); continue; }
        const videoMatch = t.match(/^@\[video(?::\s*(.*?))?\]\((.*?)\)$/);
        if (videoMatch) {
          flush();
          const title = videoMatch[1] || '视频';
          const url = videoMatch[2];
          blocks.push(`<section class="article-video" style="margin:14px 0;padding:10px;border:1px solid #d9e2ec;border-radius:8px;background:#f8fafc;"><video src="${escapeHtml(url)}" controls style="width:100%;max-height:360px;display:block;border-radius:7px;background:#000;"></video><a href="${escapeHtml(url)}" target="_blank" rel="noopener" style="display:inline-block;margin-top:8px;color:#146c94;font-weight:800;text-decoration:none;">${inlineMarkdown(title)}：打开视频链接</a></section>`);
          continue;
        }
        const imageMatch = t.match(/^!\[(.*?)\]\((.*?)\)$/);
        if (imageMatch) {
          flush();
          blocks.push(`<p style="text-align:center"><img src="${escapeHtml(imageMatch[2])}" alt="${escapeHtml(imageMatch[1] || '文章配图')}" style="max-width:100%;border-radius:8px"></p>`);
          continue;
        }
        if (/^[-*]\s+/.test(t)) { flush(); blocks.push(`<p>• ${inlineMarkdown(t.replace(/^[-*]\s+/, ''))}</p>`); continue; }
        paragraph.push(t);
      }
      flush();
      return blocks.join('\n');
    }

    function wechatHtml(markdown) {
      return `<section style="max-width:100%;margin:0 auto;padding:4px 0 12px;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;">${markdownToHtml(markdown)
        .replaceAll('<h2>', '<h2 style="margin:26px 0 12px;padding-left:10px;border-left:4px solid #0ea5e9;color:#0f172a;font-size:19px;">')
        .replaceAll('<h3>', '<h3 style="margin:22px 0 10px;color:#155e75;font-size:17px;">')
        .replaceAll('<p>', '<p style="margin:12px 0;line-height:1.9;color:#263238;font-size:15px;">')
        .replaceAll('<blockquote>', '<blockquote style="margin:16px 0;padding:12px 14px;background:#f0f9ff;border-left:4px solid #38bdf8;color:#334155;">')}</section>`;
    }

    function parseVisualBlocks(markdown) {
      const lines = String(markdown || '').split(/\r?\n/);
      const blocks = [];
      let buffer = [];
      const flush = () => {
        const text = buffer.join('\n').trim();
        if (text) blocks.push({ type: 'text', text });
        buffer = [];
      };
      for (const line of lines) {
        const t = line.trim();
        const imageMatch = t.match(/^!\[(.*?)\]\((data:image\/[a-zA-Z0-9.+-]+;base64,[^)]+|https?:\/\/[^)]+)\)$/);
        if (imageMatch) {
          flush();
          blocks.push({ type: 'image', alt: imageMatch[1] || '文章配图', src: imageMatch[2] });
          continue;
        }
        if (!t) {
          flush();
          continue;
        }
        if (/^<!--[\s\S]*-->$/.test(t)) {
          flush();
          continue;
        }
        const videoMatch = t.match(/^@\[video(?::\s*(.*?))?\]\((https?:\/\/[^)]+)\)$/);
        if (videoMatch) {
          flush();
          blocks.push({ type: 'video', title: videoMatch[1] || '视频', src: videoMatch[2] });
          continue;
        }
        buffer.push(line);
      }
      flush();
      return blocks;
    }

    function visualBlockToMarkdown(block) {
      if (block.type === 'image') return `![${block.alt || '文章配图'}](${block.src})`;
      if (block.type === 'video') return `@[video: ${block.title || '视频'}](${block.src})`;
      return block.text || '';
    }

    function syncVisualToMarkdown() {
      $('markdown').value = visualBlocks.map(visualBlockToMarkdown).filter(Boolean).join('\n\n');
      updatePreviewOnly();
      renderInlineFigureSlots();
    }

    function updatePreviewOnly() {
      const markdown = $('markdown').value;
      currentHtml = wechatHtml(markdown);
      $('preview').innerHTML = markdownToHtml(markdown) || '<p style="color:#607086">暂无内容</p>';
      renderImagePlaceholders();
    }

    function renderVisualEditor() {
      const box = $('visualEditor');
      if (!box) return;
      visualBlocks = parseVisualBlocks($('markdown').value);
      if (!visualBlocks.length) {
        box.innerHTML = '<div class="visual-empty">暂无正文</div>';
        return;
      }
      box.innerHTML = visualBlocks.map((block, i) => {
        if (block.type === 'image') {
          return `
            <div class="visual-block visual-image ${i === selectedVisualIndex ? 'active' : ''}" draggable="true" data-index="${i}" onclick="setActiveVisualBlock(${i})" ondragstart="startVisualDrag(event, ${i})" ondragover="overVisualBlock(event)" ondragleave="leaveVisualBlock(event)" ondrop="dropVisualBlock(event, ${i})">
              <img src="${block.src}" alt="${escapeHtml(block.alt)}">
              <div class="visual-image-bar">
                <span>拖动图片调整位置</span>
                <button onclick="removeVisualBlock(${i})">删除</button>
              </div>
            </div>
          `;
        }
        if (block.type === 'video') {
          return `
            <div class="visual-block visual-video ${i === selectedVisualIndex ? 'active' : ''}" draggable="true" data-index="${i}" onclick="setActiveVisualBlock(${i})" ondragstart="startVisualDrag(event, ${i})" ondragover="overVisualBlock(event)" ondragleave="leaveVisualBlock(event)" ondrop="dropVisualBlock(event, ${i})">
              <video src="${block.src}" controls></video>
              <div class="visual-image-bar">
                <span>${escapeHtml(block.title || '视频')}</span>
                <button onclick="removeVisualBlock(${i})">删除</button>
              </div>
            </div>
          `;
        }
        return `
          <div class="visual-block visual-text ${i === selectedVisualIndex ? 'active' : ''}" draggable="true" contenteditable="true" data-index="${i}" onclick="setActiveVisualBlock(${i})" oninput="updateVisualText(${i}, this.innerText)" ondragstart="startVisualDrag(event, ${i})" ondragover="overVisualBlock(event)" ondragleave="leaveVisualBlock(event)" ondrop="dropVisualBlock(event, ${i})">${escapeHtml(block.text)}</div>
        `;
      }).join('');
    }

    function setActiveVisualBlock(index) {
      selectedVisualIndex = index;
      document.querySelectorAll('.visual-block').forEach(el => {
        el.classList.toggle('active', Number(el.dataset.index) === index);
      });
    }

    function updateVisualText(index, text) {
      if (!visualBlocks[index]) return;
      visualBlocks[index].text = text.trim();
      syncVisualToMarkdown();
    }

    function startVisualDrag(event, index) {
      visualDragIndex = index;
      event.dataTransfer.effectAllowed = 'move';
      event.dataTransfer.setData('application/x-visual-index', String(index));
    }

    function overVisualBlock(event) {
      event.preventDefault();
      event.currentTarget.classList.add('drag-over');
    }

    function leaveVisualBlock(event) {
      event.currentTarget.classList.remove('drag-over');
    }

    function dropVisualBlock(event, targetIndex) {
      event.preventDefault();
      event.currentTarget.classList.remove('drag-over');
      const imageMarkdownText = event.dataTransfer.getData('text/plain');
      const imageMatch = imageMarkdownText.match(/^!\[(.*?)\]\((data:image\/[a-zA-Z0-9.+-]+;base64,[^)]+|https?:\/\/[^)]+)\)$/m);
      if (imageMatch && event.dataTransfer.getData('application/x-wechat-image-index')) {
        visualBlocks.splice(targetIndex, 0, { type: 'image', alt: imageMatch[1] || '文章配图', src: imageMatch[2] });
        syncVisualToMarkdown();
        renderVisualEditor();
        return;
      }
      const from = Number(event.dataTransfer.getData('application/x-visual-index'));
      if (!Number.isInteger(from) || from === targetIndex || !visualBlocks[from]) return;
      const [moved] = visualBlocks.splice(from, 1);
      const nextIndex = from < targetIndex ? targetIndex - 1 : targetIndex;
      visualBlocks.splice(nextIndex, 0, moved);
      syncVisualToMarkdown();
      renderVisualEditor();
    }

    function removeVisualBlock(index) {
      visualBlocks.splice(index, 1);
      if (selectedVisualIndex >= visualBlocks.length) selectedVisualIndex = visualBlocks.length - 1;
      syncVisualToMarkdown();
      renderVisualEditor();
    }

    function addImageBlockToVisual(item) {
      visualBlocks = parseVisualBlocks($('markdown').value);
      const insertAt = selectedVisualIndex >= 0 && selectedVisualIndex < visualBlocks.length
        ? selectedVisualIndex + 1
        : visualBlocks.length;
      visualBlocks.splice(insertAt, 0, { type: 'image', alt: item.prompt || '文章配图', src: item.dataUrl });
      selectedVisualIndex = insertAt;
      syncVisualToMarkdown();
      renderVisualEditor();
      requestAnimationFrame(() => {
        document.querySelector(`.visual-block[data-index="${insertAt}"]`)?.scrollIntoView({ block: 'center', behavior: 'smooth' });
      });
    }

    function addVideoBlockToVisual(url, title = '视频') {
      if (!url) return;
      visualBlocks = parseVisualBlocks($('markdown').value);
      const insertAt = selectedVisualIndex >= 0 && selectedVisualIndex < visualBlocks.length
        ? selectedVisualIndex + 1
        : visualBlocks.length;
      visualBlocks.splice(insertAt, 0, { type: 'video', title, src: url });
      selectedVisualIndex = insertAt;
      syncVisualToMarkdown();
      renderVisualEditor();
      requestAnimationFrame(() => {
        document.querySelector(`.visual-block[data-index="${insertAt}"]`)?.scrollIntoView({ block: 'center', behavior: 'smooth' });
      });
    }

    function toggleSource() {
      $('markdown').classList.toggle('source-collapsed');
    }

    function togglePasteBox() {
      $('pasteInput').classList.toggle('source-collapsed');
      if (!$('pasteInput').classList.contains('source-collapsed')) $('pasteInput').focus();
    }

    function importPastedArticle() {
      const text = $('pasteInput').value.trim();
      if (!text) return alert('请先粘贴文章内容');
      $('markdown').value = text;
      $('pasteInput').classList.add('source-collapsed');
      refreshPreview();
      log('已导入粘贴文章。');
    }

    function selectedVisualTextBlock() {
      const selection = window.getSelection();
      if (!selection || !selection.rangeCount) return null;
      const node = selection.anchorNode;
      const el = node?.nodeType === 1 ? node : node?.parentElement;
      return el?.closest?.('.visual-text') || null;
    }

    function applyMarkdownWrapper(index, wrapper) {
      const block = visualBlocks[index];
      if (!block || block.type !== 'text') return;
      const selection = window.getSelection();
      const selected = String(selection || '').trim();
      if (selected && block.text.includes(selected)) {
        block.text = block.text.replace(selected, wrapper(selected));
      } else {
        block.text = wrapper(block.text);
      }
      syncVisualToMarkdown();
      renderVisualEditor();
    }

    function formatSelection(type) {
      const blockEl = selectedVisualTextBlock();
      if (!blockEl) return alert('请先点击或选中文章里的文字');
      const index = Number(blockEl.dataset.index);
      if (type === 'h2') return applyMarkdownWrapper(index, text => `## ${text.replace(/^#+\s*/, '')}`);
      if (type === 'bold') return applyMarkdownWrapper(index, text => `**${text}**`);
      if (type === 'quote') return applyMarkdownWrapper(index, text => text.split(/\n/).map(line => `> ${line}`).join('\n'));
      if (type === 'style') {
        const color = $('fontColor').value || '#0f172a';
        const size = $('fontSize').value || '15';
        return applyMarkdownWrapper(index, text => `{size:${size}}{color:${color}}${text}{/color}{/size}`);
      }
    }

    function buildApiUrl(path, baseUrl = '') {
      const base = String(baseUrl || '').trim().replace(/\/+$/, '');
      if (!base) return `${APP_BASE_PATH}${path.startsWith('/') ? path : `/${path}`}`;
      return `${base}${path.startsWith('/') ? path : `/${path}`}`;
    }

    function publishApiBase() {
      return $('publishBaseUrl')?.value.trim() || '';
    }

    function generateApiBase() {
      return $('generateBaseUrl')?.value.trim() || '';
    }

    const AI_PROVIDER_PRESETS = {
      agnes: { baseUrl: 'https://apihub.agnes-ai.com/v1', textModel: 'agnes-2.0-flash', imageModel: 'agnes-image-2.1-flash', videoModel: 'agnes-video-v2.0' },
      volcengine: { baseUrl: 'https://ark.cn-beijing.volces.com/api/v3', textModel: '', imageModel: 'doubao-seedream-5-0-260128', videoModel: '' },
      siliconflow: { baseUrl: 'https://api.siliconflow.cn/v1', textModel: '', imageModel: 'black-forest-labs/FLUX.1-schnell', videoModel: '' },
      custom: { baseUrl: '', textModel: '', imageModel: '', videoModel: '' }
    };

    function aiSettings() {
      return {
        provider: $('aiProvider')?.value || 'agnes',
        baseUrl: $('aiBaseUrl')?.value.trim() || '',
        apiKey: $('aiApiKey')?.value.trim() || '',
        textModel: $('aiTextModel')?.value.trim() || '',
        imageModel: $('aiImageModel')?.value.trim() || '',
        videoModel: $('aiVideoModel')?.value.trim() || ''
      };
    }

    function saveAiSettings() {
      localStorage.setItem('gongzhonghao_ai_settings', JSON.stringify(aiSettings()));
    }

    function applyProviderPreset(force = false) {
      const provider = $('aiProvider')?.value || 'agnes';
      const preset = AI_PROVIDER_PRESETS[provider] || AI_PROVIDER_PRESETS.agnes;
      if (force || !$('aiBaseUrl').value.trim()) $('aiBaseUrl').value = preset.baseUrl;
      if (force || !$('aiTextModel').value.trim()) $('aiTextModel').value = preset.textModel;
      if (force || !$('aiImageModel').value.trim()) $('aiImageModel').value = preset.imageModel;
      if (force || !$('aiVideoModel').value.trim()) $('aiVideoModel').value = preset.videoModel;
      saveAiSettings();
    }

    function loadAiSettings() {
      const saved = JSON.parse(localStorage.getItem('gongzhonghao_ai_settings') || '{}');
      if ($('aiProvider')) $('aiProvider').value = saved.provider || 'agnes';
      applyProviderPreset(false);
      if (saved.baseUrl) $('aiBaseUrl').value = saved.baseUrl;
      if (saved.apiKey) $('aiApiKey').value = saved.apiKey;
      if (saved.textModel) $('aiTextModel').value = saved.textModel;
      if (saved.imageModel) $('aiImageModel').value = saved.imageModel;
      if (saved.videoModel) $('aiVideoModel').value = saved.videoModel;
      ['aiBaseUrl', 'aiApiKey', 'aiTextModel', 'aiImageModel', 'aiVideoModel'].forEach(id => $(id)?.addEventListener('input', saveAiSettings));
    }

    function shouldUseDirectAi() {
      const ai = aiSettings();
      return Boolean(ai.apiKey && ai.baseUrl && !generateApiBase());
    }

    async function directAiFetch(endpoint, payload, timeout = 150000) {
      const ai = aiSettings();
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeout);
      try {
        const res = await fetch(ai.baseUrl.replace(/\/+$/, '') + endpoint, {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + ai.apiKey,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload),
          signal: controller.signal
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error?.message || data.message || ('HTTP ' + res.status));
        return data;
      } finally {
        clearTimeout(timer);
      }
    }

    function extractJsonObject(text) {
      const raw = String(text || '').trim();
      try { return JSON.parse(raw); } catch {}
      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('AI did not return JSON');
      return JSON.parse(match[0]);
    }

    async function directComposeArticle(body) {
      const ai = aiSettings();
      const topic = String(body.topic || '').trim() || '公众号文章选题';
      const audience = String(body.audience || '').trim() || '公众号读者';
      const tone = String(body.tone || '').trim() || '清楚、接地气、有判断';
      const points = String(body.points || '').trim();
      const system = [
        'You are a WeChat official account article writing assistant.',
        'Write in Chinese. Do not invent a fixed industry, persona, or career background.',
        'Only use the user provided topic, audience, tone, and points.',
        'Return strict JSON only with fields: title, summary, markdown, imagePrompts.',
        'The title, summary, markdown, imagePrompts, and image placeholder descriptions must all be Simplified Chinese.',
        'In markdown, you may add 3-5 image placeholders using: <!-- image: 中文图片描述 -->.'
      ].join('\n');
      const user = [
        'Topic: ' + topic,
        'Audience: ' + audience,
        'Tone: ' + tone,
        'Must include points:',
        points,
        '',
        'Requirements: title 16-28 Chinese characters; summary 60-120 Chinese characters; body 1200-2200 Chinese characters in Markdown; stay strictly within user input. Image prompts must be practical Simplified Chinese descriptions that ordinary users can read and edit.'
      ].join('\n');
      const data = await directAiFetch('/chat/completions', {
        model: ai.textModel || 'agnes-2.0-flash',
        messages: [
          { role: 'system', content: system },
          { role: 'user', content: user }
        ],
        temperature: 0.75
      }, 150000);
      const parsed = extractJsonObject(data.choices?.[0]?.message?.content);
      const markdown = String(parsed.markdown || '').trim();
      return {
        title: String(parsed.title || topic).trim().slice(0, 64),
        summary: String(parsed.summary || '').trim().slice(0, 120),
        markdown,
        imagePrompts: Array.isArray(parsed.imagePrompts) ? parsed.imagePrompts.slice(0, 5) : [],
        model: ai.textModel || 'agnes-2.0-flash'
      };
    }

    async function imageUrlToDataUrl(url) {
      const res = await fetch(url);
      const blob = await res.blob();
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function directAiImage(prompt, extra = {}) {
      const ai = aiSettings();
      const negative = String(extra.negative_prompt || '').trim();
      const payload = {
        model: extra.model || ai.imageModel || 'agnes-image-2.1-flash',
        prompt,
        size: extra.size || '1024x1024',
        extra_body: { response_format: 'url' },
        ...(negative ? { negative_prompt: negative } : {})
      };
      const data = await directAiFetch('/images/generations', payload, 150000);
      const item = Array.isArray(data.data) ? data.data[0] : data;
      const imageUrl = item?.url || item?.image_url || data.url || data.image_url || data.images?.[0]?.url;
      const b64 = item?.b64_json || data.b64_json;
      if (b64) return { ok: true, dataUrl: 'data:image/png;base64,' + b64, model: payload.model };
      if (imageUrl) {
        let dataUrl = imageUrl;
        try { dataUrl = await imageUrlToDataUrl(imageUrl); } catch {}
        return { ok: true, dataUrl, imageUrl, model: payload.model };
      }
      throw new Error('AI did not return an image');
    }

    async function directAiVideo(prompt) {
      const ai = aiSettings();
      const data = await directAiFetch('/videos', {
        model: ai.videoModel || 'agnes-video-v2.0',
        prompt,
        height: 768,
        width: 1152,
        num_frames: 121,
        frame_rate: 24
      }, 150000);
      return { ok: true, data };
    }

    async function directVideoStatus(task) {
      const ai = aiSettings();
      const videoId = task.video_id || task.videoId;
      const taskId = task.task_id || task.taskId;
      const url = videoId
        ? 'https://apihub.agnes-ai.com/agnesapi?video_id=' + encodeURIComponent(videoId)
        : ai.baseUrl.replace(/\/+$/, '') + '/videos/' + encodeURIComponent(taskId);
      const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + ai.apiKey } });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error?.message || data.message || ('HTTP ' + res.status));
      return { ok: true, data };
    }

    async function api(path, body = {}, timeout = 30000, baseUrl = '') {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeout);
      try {
        const headers = { 'Content-Type': 'application/json' };
        const token = $('token').value.trim();
        const ai = aiSettings();
        if (token) headers['X-Publish-Token'] = token;
        if (ai.apiKey) headers['X-AI-Key'] = ai.apiKey;
        if (ai.provider) headers['X-AI-Provider'] = ai.provider;
        if (ai.baseUrl) headers['X-AI-Base-URL'] = ai.baseUrl;
        if (ai.textModel) headers['X-AI-Text-Model'] = ai.textModel;
        if (ai.imageModel) headers['X-AI-Image-Model'] = ai.imageModel;
        if (ai.videoModel) headers['X-AI-Video-Model'] = ai.videoModel;
        const res = await fetch(buildApiUrl(path, baseUrl), { method: 'POST', headers, body: JSON.stringify(body), signal: controller.signal });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
        return data;
      } finally {
        clearTimeout(timer);
      }
    }

    function ensureImagePlaceholders(markdown, prompts) {
      const cleanPrompts = (prompts || []).map(item => String(item || '').trim()).filter(Boolean);
      if (!cleanPrompts.length || /<!--\s*image:\s*[\s\S]*?-->/g.test(markdown)) return markdown;
      const lines = String(markdown || '').split(/\r?\n/);
      let used = 0;
      const output = [];
      for (const line of lines) {
        output.push(line);
        if (used < cleanPrompts.length && /^#{2,3}\s+/.test(line.trim())) {
          output.push('');
          output.push(`<!-- image: ${cleanPrompts[used]} -->`);
          output.push('');
          used += 1;
        }
      }
      while (used < cleanPrompts.length) {
        output.push('');
        output.push(`<!-- image: ${cleanPrompts[used]} -->`);
        used += 1;
      }
      return output.join('\n');
    }

    function setupDragAutoScroll() {
      let frame = 0;
      document.addEventListener('dragover', event => {
        const body = event.target.closest?.('.body');
        if (!body) return;
        const rect = body.getBoundingClientRect();
        const edge = 70;
        let delta = 0;
        if (event.clientY < rect.top + edge) delta = -18;
        if (event.clientY > rect.bottom - edge) delta = 18;
        if (!delta || frame) return;
        frame = requestAnimationFrame(() => {
          body.scrollTop += delta;
          frame = 0;
        });
      });
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
      const chars = Array.from(text);
      let line = '';
      let lines = 0;
      for (const ch of chars) {
        const test = line + ch;
        if (ctx.measureText(test).width > maxWidth && line) {
          ctx.fillText(line, x, y);
          y += lineHeight;
          lines += 1;
          line = ch;
          if (lines >= maxLines - 1) break;
        } else {
          line = test;
        }
      }
      if (line && lines < maxLines) ctx.fillText(line, x, y);
    }

    function renderCover() {
      const canvas = $('cover');
      const ctx = canvas.getContext('2d');
      const title = $('title').value || $('topic').value || '公众号文章';
      const summary = $('summary').value || '喵喵小仙儿';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      gradient.addColorStop(0, '#e0f2fe');
      gradient.addColorStop(1, '#f8fafc');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0f8b8d';
      ctx.fillRect(0, 0, 18, canvas.height);
      ctx.fillStyle = '#0f172a';
      ctx.font = '700 52px Microsoft YaHei, sans-serif';
      wrapText(ctx, title, 70, 125, 720, 64, 2);
      ctx.fillStyle = '#475569';
      ctx.font = '28px Microsoft YaHei, sans-serif';
      wrapText(ctx, summary, 72, 270, 740, 38, 2);
      ctx.fillStyle = '#146c94';
      ctx.font = '700 24px Microsoft YaHei, sans-serif';
      ctx.fillText('喵喵小仙儿', 70, 342);
      ctx.fillStyle = '#94a3b8';
      ctx.font = '20px Microsoft YaHei, sans-serif';
      ctx.fillText('AI × 内容创作 × 公众号', 218, 342);
      coverDataUrl = canvas.toDataURL('image/png');
      const preview = $('coverPreview');
      preview.src = coverDataUrl;
      preview.style.display = 'block';
      log('封面已生成。');
    }

    function extractCoverTextPrompt(userPrompt) {
      const text = userPrompt.trim();
      const match = text.match(/(?:白色字|黑色字|文字|字|标题)\s*[：:]\s*([\s\S]+)/);
      if (match) return match[1].trim().replace(/^["“]|["”]$/g, '');
      if (/黑底|纯黑|白字|白色字|文字封面/.test(text)) return text.replace(/纯黑底|黑底|白色字|白字|文字|封面|[：:]/g, ' ').trim();
      return '';
    }

    function renderPromptTextCover(userPrompt) {
      const canvas = $('cover');
      const ctx = canvas.getContext('2d');
      const coverText = extractCoverTextPrompt(userPrompt) || $('title').value || '公众号文章';
      const dark = /黑底|纯黑|黑色/.test(userPrompt);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = dark ? '#050505' : '#f8fafc';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = dark ? '#ffffff' : '#0f172a';
      ctx.font = '800 58px Microsoft YaHei, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      wrapText(ctx, coverText, canvas.width / 2, 150, 760, 72, 3);
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      coverDataUrl = canvas.toDataURL('image/png');
      const preview = $('coverPreview');
      preview.src = coverDataUrl;
      preview.style.display = 'block';
      log('文字封面已生成。');
    }

    function buildCoverPrompt(userPrompt) {
      const text = userPrompt.trim();
      const wantsLandscape = /风景|景色|山|海|湖|森林|草地|天空|日出|日落|自然|田野|河流|溪流|云|远山/.test(text);
      const asksPeople = /人|人物|女孩|男孩|女人|男人|儿童|小孩|孩子|宝宝|舞蹈|跳舞|肖像|自拍|团队|工人|老板|员工/.test(text);
      if (wantsLandscape) {
        return [
          text,
          '公众号横版封面图，真实摄影感，画面干净明亮，自然光。',
          asksPeople ? '只生成用户明确要求的主体。' : '只要自然风景，不要人物，不要办公室，不要电脑，不要屏幕，不要图表。',
          '不要文字，不要标题，不要水印，不要 logo。'
        ].join('\n');
      }
      if (text) {
        return text;
      }
      return '一张干净明亮的公众号横版封面图，自然光，画面简洁，不要文字，不要水印';
    }

    function buildCoverNegativePrompt(userPrompt) {
      const text = userPrompt.trim();
      const asksPeople = /人|人物|女孩|男孩|女人|男人|儿童|小孩|孩子|宝宝|舞蹈|跳舞|肖像|自拍|团队|工人|老板|员工/.test(text);
      const wantsLandscape = /风景|景色|山|海|湖|森林|草地|天空|日出|日落|自然|田野|河流|溪流|云|远山/.test(text);
      const basic = ['text', 'words', 'caption', 'logo', 'watermark', 'low quality', 'distorted'];
      if (wantsLandscape && !asksPeople) {
        basic.push('people', 'person', 'human', 'woman', 'man', 'face', 'portrait', 'office', 'laptop', 'computer', 'screen', 'desk', 'chart');
      }
      return basic.join(', ');
    }

    async function generateAiCover() {
      const userPrompt = $('coverPrompt').value.trim();
      if (/黑底|纯黑|白色字|白字|文字|字[：:]|标题[：:]/.test(userPrompt)) {
        renderPromptTextCover(userPrompt);
        return;
      }
      const prompt = buildCoverPrompt(userPrompt);
      try {
        log('开始生成公众号 AI 封面图...');
        log(`封面提示词：${userPrompt || '默认风景图'}`);
        const imagePayload = {
          prompt,
          size: '1024x768',
          negative_prompt: buildCoverNegativePrompt(userPrompt)
        };
        const data = shouldUseDirectAi()
          ? await directAiImage(prompt, imagePayload)
          : await api('/api/ai/image', imagePayload, 120000, generateApiBase());
        generatedImageDataUrl = data.dataUrl;
        addGeneratedImage(generatedImageDataUrl, `封面图：${userPrompt || '默认风景图'}`);
        applyImageAsCover(generatedImageDataUrl);
        log(`AI 封面图已生成并设为当前封面，模型：${data.model || '默认模型'}`);
      } catch (err) {
        const message = `AI 封面图生成失败：${err.message}`;
        log(message);
        alert(message);
      }
    }

    async function generateAiImageFromPrompt(index) {
      const prompts = JSON.parse($('placeholderList').dataset.prompts || '[]');
      const prompt = prompts[index];
      if (!prompt) return;
      $('mediaPrompt').value = prompt;
      $('assistantPrompt').value = prompt;
      await generateAiImage();
    }

    function insertGeneratedImage() {
      const item = generatedImages[selectedImageIndex] || (generatedImageDataUrl ? { dataUrl: generatedImageDataUrl, prompt: $('mediaPrompt').value.trim() || 'AI生成插图' } : null);
      if (!item) return alert('请先生成或选中一张 AI 图片');
      addImageBlockToVisual(item);
      log('图片已插入正文，可在中间排版区拖动调整位置。');
    }

    function useGeneratedImageAsCover() {
      if (!generatedImageDataUrl) return alert('请先生成 AI 图片');
      applyImageAsCover(generatedImageDataUrl);
    }

    function applyImageAsCover(dataUrl) {
      coverDataUrl = dataUrl;
      const preview = $('coverPreview');
      preview.src = dataUrl;
      preview.style.display = 'block';
      const canvas = $('cover');
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.onload = () => {
        try {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
          const w = img.width * scale;
          const h = img.height * scale;
          ctx.drawImage(img, (canvas.width - w) / 2, (canvas.height - h) / 2, w, h);
          coverDataUrl = canvas.toDataURL('image/png');
          preview.src = coverDataUrl;
        } catch {
          coverDataUrl = dataUrl;
        }
        log('Cover image set.');
      };
      img.onerror = () => {
        coverDataUrl = dataUrl;
        log('Cover image set.');
      };
      if (/^https?:\/\//i.test(dataUrl)) img.crossOrigin = 'anonymous';
      img.src = dataUrl;
    }

    function extractVideoUrl(data) {
      if (!data || typeof data !== 'object') return '';
      return data.url
        || data.video_url
        || data.output_url
        || data.remixed_from_video_id
        || data.data?.url
        || data.data?.video_url
        || '';
    }

    function setVideoStatus(message) {
      const box = $('videoResult');
      if (box) box.style.display = 'block';
      if ($('videoStatusText')) $('videoStatusText').textContent = message;
    }

    function showVideoResult(url, message = '视频已生成。') {
      currentVideoUrl = url;
      const video = $('videoPreview');
      if (video) {
        video.src = url;
        video.style.display = 'block';
      }
      setVideoStatus(message);
    }

    async function checkCurrentVideoStatus() {
      if (!currentVideoTask) return alert('还没有视频任务。');
      const data = shouldUseDirectAi()
        ? await directVideoStatus(currentVideoTask)
        : await api('/api/ai/video-status', currentVideoTask, 60000, currentVideoApiBase);
      const result = data.data || {};
      const status = result.status || result.state || 'unknown';
      const progress = result.progress ?? result.percent ?? '';
      const videoUrl = extractVideoUrl(result);
      if (videoUrl && (status === 'completed' || status === 'succeeded' || progress === 100)) {
        clearTimeout(videoPollTimer);
        showVideoResult(videoUrl, `视频已生成：${status}，进度 ${progress || 100}%`);
        log(`视频已生成：${videoUrl}`);
        return result;
      }
      if (result.error) {
        clearTimeout(videoPollTimer);
        setVideoStatus(`视频生成失败：${JSON.stringify(result.error).slice(0, 180)}`);
        return result;
      }
      setVideoStatus(`视频生成中：${status}，进度 ${progress || 0}%`);
      return result;
    }

    function pollCurrentVideoStatus() {
      clearTimeout(videoPollTimer);
      videoPollTimer = setTimeout(async () => {
        try {
          const result = await checkCurrentVideoStatus();
          const done = extractVideoUrl(result) && (result.status === 'completed' || result.status === 'succeeded' || result.progress === 100);
          if (!done && !result?.error) pollCurrentVideoStatus();
        } catch (err) {
          setVideoStatus(`查询视频状态失败：${err.message}`);
        }
      }, 10000);
    }

    function openCurrentVideo() {
      if (!currentVideoUrl) return alert('视频还没生成完成。');
      window.open(currentVideoUrl, '_blank');
    }

    function insertCurrentVideo() {
      if (!currentVideoUrl) return alert('视频还没生成完成。');
      addVideoBlockToVisual(currentVideoUrl, $('videoPrompt').value.trim() || '视频');
      log('视频已插入正文当前位置。');
    }

    async function generateVideo() {
      const prompt = $('videoPrompt').value.trim();
      if (!prompt) {
        alert('请先填写视频提示词。');
        return;
      }
      log('开始请求 AI 视频生成...');
      currentVideoApiBase = generateApiBase();
      const data = shouldUseDirectAi()
        ? await directAiVideo(prompt)
        : await api('/api/ai/video', { prompt }, 120000, currentVideoApiBase);
      if (data.ok === false) {
        log(data.message);
        alert(data.message);
        return;
      }
      log(`视频任务已提交：${JSON.stringify(data.data).slice(0, 300)}`);
      currentVideoTask = {
        video_id: data.data?.video_id || data.data?.videoId || data.data?.id,
        task_id: data.data?.task_id || data.data?.taskId || data.data?.id
      };
      setVideoStatus('视频任务已提交，正在生成中...');
      await checkCurrentVideoStatus();
      pollCurrentVideoStatus();
    }

    async function testToken() {
      log('测试微信接口连接...');
      const data = await api('/api/wechat/test-token', {}, 20000, publishApiBase());
      log(`微信连接正常：${data.tokenPreview}`);
    }

    async function publishDraft() {
      if (!$('title').value.trim()) return alert('请先填写标题');
      if (!$('markdown').value.trim()) return alert('请先生成或填写正文');
      if (!coverDataUrl) renderCover();
      $('publishBtn').disabled = true;
      try {
        log('开始发布到公众号草稿箱...');
        refreshPreview();
        const data = await api('/api/wechat/draft', {
          title: $('title').value,
          summary: $('summary').value,
          markdown: $('markdown').value,
          html: currentHtml,
          coverDataUrl
        }, 60000, publishApiBase());
        log(`发布成功：${data.message}`);
        log(`media_id: ${data.mediaId}`);
      } catch (err) {
        log(`发布失败：${err.message}`);
        alert(err.message);
      } finally {
        $('publishBtn').disabled = false;
      }
    }

    $('log').textContent = '面板已加载。';
    loadAiSettings();
    checkStatus();
    refreshPreview();
    renderImageLibrary();
    renderAssistantPromptList();
    renderAssistantImageLibrary();
    setupMarkdownDrop();
    setupVisualEditorDrop();
    setupDragAutoScroll();
  </script>
</body>
</html>
